version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: sewnova-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: sewnova
    volumes:
      - mongodb_data:/data/db
      - ./mongodb-init:/docker-entrypoint-initdb.d
    networks:
      - sewnova-network

  # Auth Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: sewnova-auth
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb+srv://aromalgirish00:aromal00@sewnova.tlnzt4i.mongodb.net/?retryWrites=true&w=majority&appName=sewnova
      - JWT_SECRET=b8d2f8b9c24a17e1d1e1a2f6b5c3a8791e9b47a1e3c38a7216e7bbf7f28d194d
      - JWT_REFRESH_SECRET=your_refresh_secret_here
      - GOOGLE_CLIENT_ID=648036319844-qp2nk1cg25ukh0j9ritk0mtbslbbccqk.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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9ritk0mtbslbbccqk.apps.googleusercontent.com
      - EMAIL_SERVICE_API_KEY=${EMAIL_SERVICE_API_KEY}
      - EMAIL_FROM=aromalgirish00@gmail.com
      - FRONTEND_URL=http://localhost:5173
      - LOG_LEVEL=${LOG_LEVEL}
    depends_on:
      - mongodb
    networks:
      - sewnova-network

